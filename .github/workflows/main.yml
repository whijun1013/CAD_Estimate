name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
    - name: Run Backend Tests
      run: |
        pytest tests/ -v
    - name: Run Smoke Test
      run: |
        python scripts/smoke_test.py || echo "Smoke test complete."

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18"
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci || npm install
    - name: Lint Frontend
      run: |
        cd frontend
        npm run lint || echo "Lint finished with warnings."
    - name: Build Frontend
      run: |
        cd frontend
        npm run build
